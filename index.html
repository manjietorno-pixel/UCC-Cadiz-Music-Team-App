// ── Helpers ────────────────────────────────────────────────────
function getYouTubeId(url) {
  if (!url) return null;
  for (const p of [/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/, /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/]) {
    const m = url.match(p); if (m) return m[1];
  }
  return null;
}
function getSunday(date) {
  const d = new Date(date); d.setDate(d.getDate() - d.getDay());
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function addWeeks(dateStr, n) {
  const [y,m,d] = dateStr.split("-").map(Number), date = new Date(y, m-1, d);
  date.setDate(date.getDate() + n*7);
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
}
function weekLabel(w) { const [y,m,d]=w.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"}); }
function weekShort(w) { const [y,m,d]=w.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function weekKey(w) { return "w"+w.replace(/-/g,""); }
function keyToDate(k) { const s=k.replace(/^w/,""); return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`; }
function getSundaysInMonth(year, month) {
  const sundays=[], d=new Date(year,month,1);
  d.setDate(d.getDate()+((7-d.getDay())%7));
  while(d.getMonth()===month){
    sundays.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`);
    d.setDate(d.getDate()+7);
  }
  return sundays;
}
function monthLabel(year, month) { return new Date(year,month,1).toLocaleDateString("en-US",{month:"long",year:"numeric"}); }

// ── AI Lyrics Generator ────────────────────────────────────────
async function generateAILyrics(title, artist, category, songKey) {
  const keyInfo = songKey ? `Musical Key: ${songKey}` : "Key: Not specified";
  const prompt = `You are a worship music assistant for a Filipino church team (UCC Pasay).

Generate a structured lyrics and chord chart reference for the worship team based on:
Song Title: ${title}
Artist / Composer: ${artist || "Unknown"}
Category: ${category}
${keyInfo}

Instructions:
- Add proper section labels: [Verse 1], [Pre-Chorus], [Chorus], [Verse 2], [Bridge], [Outro] — only include sections that fit the song
- ${songKey ? `Since the key is ${songKey}, add chord markers above each lyric line like this:\n  G        D        Em       C\n  Line of lyrics here` : "Do not add chords since no key was provided"}
- Write worship-appropriate lyrics that match the song title, category, and artist's typical style
- Keep it realistic and singable for a church congregation
- For Filipino worship songs, you may include a mix of English and Filipino if appropriate

Return ONLY the formatted lyrics/chord chart. No explanations, no markdown, no preamble.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  return data.content[0].text;
}

// ── Auth Gate ──────────────────────────────────────────────────
function AuthGate() {
  const [user,setUser]=useState(undefined), [signingOut,setSigningOut]=useState(false);
  useEffect(()=>{ if(!auth){setUser(null);return;} return auth.onAuthStateChanged(u=>setUser(u)); },[]);
  async function handleSignOut() { setSigningOut(true); try{await auth.signOut();}catch(e){} setSigningOut(false); }
  if (user===undefined) return <div style={{ minHeight:"100vh", background:`linear-gradient(135deg,#0F2550,#1B3A6B)`, display:"flex", alignItems:"center", justifyContent:"center" }}><div style={{ color:"rgba(255,255,255,0.5)", fontSize:14 }}>Loading…</div></div>;
  if (!user) return <LoginScreen/>;
  return <App onSignOut={handleSignOut} signingOut={signingOut}/>;
}

  const sundays=getSundaysInMonth(calYear,calMonth), todayStr=getSunday(today);
  return (
    <div>

// ── Copy All Songs (for this Sunday) ─────────────────────────────
// Formats every song for the selected week into one clean text blob — title, artist, key,
// and lyrics — so Manj can paste it directly into a chat with Claude to build a polished
// worship lyric deck (see /mnt/skills/user/worship-lyric-deck/SKILL.md), or into a doc/email.
function formatSongsForCopy(songList, weekLabelStr) {
  if (!songList.length) return "";
  const parts = songList.map((song, i) => {
    let block = `${i + 1}. ${song.title || "Untitled"}`;
    if (song.artist) block += ` — ${song.artist}`;
    if (song.key) block += ` (Key: ${song.key})`;
    block += "\n";
    if (song.lyrics && song.lyrics.trim()) {
      block += "\n" + song.lyrics.trim() + "\n";
    } else {
      block += "\n[No lyrics added yet]\n";
    }
    return block;
  });
  return `Worship Set — ${weekLabelStr}\n${"=".repeat(40)}\n\n` + parts.join("\n" + "-".repeat(40) + "\n\n");
}

function CopyAllSongsButton({ week, songs }) {
  const [copied, setCopied] = useState(false);
  const list = songs[week] || [];

  function handleCopy() {
    const text = formatSongsForCopy(list, weekLabel(week));
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    });
  }

  return (
    <button
      onClick={handleCopy}
      disabled={list.length === 0}
      style={{
        ...B,
        background: list.length === 0 ? "#A0B0CC" : (copied ? "#1A7F55" : NAVY),
        color: WHITE,
        fontSize: 12,
        padding: "7px 14px",
        cursor: list.length === 0 ? "not-allowed" : "pointer",
        display: "flex", alignItems: "center", gap: 6,
      }}
      title={list.length === 0 ? "No songs added for this Sunday yet" : "Copy all songs + lyrics for this Sunday"}
    >
      {copied ? "✓ Copied!" : "📋 Copy All for Deck"}
    </button>
  );
}

// ── Team Schedule ──────────────────────────────────────────────
function TeamSchedule({week, sched, onSave}) {
  const [form,setForm]=useState(sched[week]||{}), [saving,setSaving]=useState(false), [saved,setSaved]=useState(true);
  const [dbStatus,setDbStatus]=useState("");
  const loadedWeekRef = useRef(null);
  useEffect(()=>{
    // Only reset/load form when the WEEK actually changes (not on every Firebase ping)
    if(loadedWeekRef.current !== week){
      setForm(sched[week]||{});
      setSaved(true);
      loadedWeekRef.current = week;
    }
  },[week,sched]);
  const set=(k,v)=>{setForm(f=>({...f,[k]:v}));setSaved(false);};
  const filled=ROLES.filter(r=>form[r.key]?.trim());
  async function save(){
    setSaving(true);
    setDbStatus("Saving…");
    try {
      await onSave(week,form);
      setDbStatus("✓ Saved successfully!");
      setSaved(true);
    } catch(e) {
      setDbStatus("✗ " + (e.message||"Unknown error"));
    }
    setSaving(false);
  }
  return (
    <div>
      {filled.length>0&&<div style={{ background:WHITE, border:`1px solid ${BORDER}`, borderRadius:12, padding:"14px 16px", marginBottom:20 }}><div style={{ fontSize:10, fontWeight:700, color:MUTED, textTransform:"uppercase", letterSpacing:"0.6px", marginBottom:10 }}>This Week's Team</div><div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>{filled.map(r=><div key={r.key} style={{ background:LIGHT, border:`1px solid ${BORDER}`, borderRadius:20, padding:"6px 14px", display:"flex", alignItems:"center", gap:8 }}><span style={{ fontSize:18 }}>{r.icon}</span><div><div style={{ fontSize:9, fontWeight:700, color:MUTED, textTransform:"uppercase", letterSpacing:"0.4px" }}>{r.label}</div><div style={{ fontSize:13, fontWeight:700, color:NAVY }}>{form[r.key]}</div></div></div>)}</div></div>}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))", gap:12, marginBottom:18 }}>
        {ROLES.map(r=><div key={r.key} style={{ background:WHITE, borderRadius:12, border:`1px solid ${BORDER}`, padding:"14px 15px" }}><div style={{ display:"flex", alignItems:"center", gap:9, marginBottom:9 }}><div style={{ width:34, height:34, borderRadius:8, background:NAVY+"15", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>{r.icon}</div><label style={{ ...LB, margin:0, fontSize:12 }}>{r.label}</label></div><input style={{ ...IN, fontSize:13 }} value={form[r.key]||""} onChange={e=>set(r.key,e.target.value)} placeholder="Enter name…"/></div>)}
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
        <button style={{ ...B, background:NAVY, color:WHITE, opacity:saving?0.6:1 }} onClick={save} disabled={saving}>{saving?"Saving…":"Save Schedule"}</button>
        {saved&&filled.length>0&&!dbStatus&&<span style={{ fontSize:13, color:"#1A7F55", fontWeight:600 }}>✓ Saved</span>}
        {!saved&&!dbStatus&&<span style={{ fontSize:13, color:GOLD, fontWeight:600 }}>● Unsaved changes</span>}
        {dbStatus&&<span style={{ fontSize:13, fontWeight:600, color:dbStatus.startsWith("✓")?"#1A7F55":dbStatus==="Saving…"?GOLD:"#C0392B" }}>{dbStatus}</span>}
      </div>
      {filled.length===0&&<div style={{ textAlign:"center", padding:"50px 0", color:MUTED }}><div style={{ fontSize:40, opacity:0.2, marginBottom:10 }}>👥</div><div style={{ fontWeight:700, fontSize:15, color:NAVY, marginBottom:4 }}>No team assigned yet</div><div style={{ fontSize:13 }}>Fill in the names above and tap Save Schedule.</div></div>}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────
function App({ onSignOut, signingOut }) {
  const [songs,setSongs]=useState({}), [sched,setSched]=useState({});
  const [week,setWeek]=useState(getSunday(new Date())), [tab,setTab]=useState("calendar");
  const [modal,setModal]=useState(false), [editing,setEditing]=useState(null);
  const [search,setSearch]=useState(""), [catFilter,setCat]=useState("All");
  const [toast,setToast]=useState(null), [status,setStatus]=useState("connecting");

  const notify=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};

  useEffect(()=>{
    if(!db){setStatus("error");return;}
    const sRef=db.ref("songs"), scRef=db.ref("schedule");
    sRef.on("value",snap=>{const val=snap.val()||{},out={};Object.keys(val).forEach(k=>{out[keyToDate(k)]=Object.values(val[k]||{});});setSongs(out);setStatus("online");},()=>setStatus("error"));
    scRef.on("value",snap=>{const val=snap.val()||{},out={};Object.keys(val).forEach(k=>{out[keyToDate(k)]=val[k];});setSched(out);});
    return()=>{sRef.off();scRef.off();};
  },[]);

  async function saveSongs(w,list){
    if(!db)return;
    const obj={};
    list.forEach(s=>{obj[s.id]=s;});
    try {
      await db.ref(`songs/${weekKey(w)}`).set(list.length?obj:null);
    } catch(e) {
      console.error("saveSongs error:", e);
      const msg = e.code ? `Save failed: ${e.code}` : "Song save failed.";
      notify(msg, "error");
    }
  }
  async function saveSched(w,data){
    if(!db){ notify("Database not connected.", "error"); return; }
    // Check auth state
    const user = auth ? auth.currentUser : null;
    if(!user){ notify("Not signed in — please reload and log in again.", "error"); return; }
    // Clean: only save roles that have a non-empty name
    const clean={};
    Object.keys(data).forEach(k=>{ if(data[k]&&data[k].trim()) clean[k]=data[k].trim(); });
    try {
      await db.ref(`schedule/${weekKey(w)}`).set(Object.keys(clean).length ? clean : null);
      notify("Team schedule saved! ✓");
    } catch(e) {
      console.error("saveSched error:", e);
      // Show the actual Firebase error code so we can diagnose
      const msg = e.code ? `Save failed: ${e.code}` : "Save failed. Check console for details.";
      notify(msg, "error");
    }
  }

  const thisWeek=getSunday(new Date()), isThisWeek=week===thisWeek;
  const allWeeks=[...new Set([...Object.keys(songs),...Object.keys(sched)])].sort().reverse();
  const weekSongs=(songs[week]||[]).filter(s=>{const q=search.toLowerCase();return(!q||s.title.toLowerCase().includes(q)||(s.artist||"").toLowerCase().includes(q))&&(catFilter==="All"||s.category===catFilter);});

  async function handleSongSave(song){
    const list=[...(songs[week]||[])];
    if(editing){const i=list.findIndex(s=>s.id===editing.id);if(i>-1)list[i]=song;else list.push(song);}else list.push(song);
    await saveSongs(week,list);setModal(false);setEditing(null);
    notify(editing?"Song updated!":"Song added! 🎵");
  }

  // For AI Lyrics tab: add song directly
  async function handleAIAddSong(song){
    const list=[...(songs[week]||[])];
    list.push(song);
    await saveSongs(week,list);
    notify("Song with AI lyrics added! 🎵");
  }

  const TABS=[
    {id:"calendar", label:"📅 Monthly View"},
    {id:"overview", label:"📋 Sunday Schedule"},
    {id:"songs",    label:"🎵 Manage Songs"},
    {id:"schedule", label:"👥 Assign Team"},
    {id:"ai",       label:"✨ AI Lyrics"},
  ];

  const statusDot={online:"#4ADE80",error:"#F87171",connecting:"#FCD34D"}[status];
  const statusText={online:"Live",error:"Offline",connecting:"Connecting…"}[status];

  return (
    <div style={{ fontFamily:"'Segoe UI',system-ui,sans-serif", background:LIGHT, minHeight:"100vh", color:"#1a2744" }}>
      <div style={{ background:"linear-gradient(135deg,#1B3A6B 0%,#2a4f8f 100%)" }}>
        <div style={{ maxWidth:860, margin:"0 auto", padding:"18px 18px 0" }}>
          <div style={{ display:"flex", alignItems:"center", gap:13, marginBottom:14 }}>
            <div style={{ width:42, height:42, borderRadius:10, background:GOLD, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              <svg width="23" height="23" viewBox="0 0 24 24" fill="none"><path d="M9 18V5l12-2v13" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><circle cx="6" cy="18" r="3" stroke="white" strokeWidth="2"/><circle cx="18" cy="16" r="3" stroke="white" strokeWidth="2"/></svg>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ color:WHITE, fontSize:18, fontWeight:800, lineHeight:1.2 }}>UCC Pasay Music Team Hub</div>
              <div style={{ color:GOLD, fontSize:11, fontWeight:600 }}>Universal Church of Christ Incorporated · Pasay City</div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10, flexShrink:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:5 }}><div style={{ width:8, height:8, borderRadius:"50%", background:statusDot }}/><span style={{ fontSize:11, color:"rgba(255,255,255,0.6)", fontWeight:500 }}>{statusText}</span></div>
              <button onClick={onSignOut} disabled={signingOut} style={{ background:"rgba(255,255,255,0.12)", border:"1px solid rgba(255,255,255,0.2)", color:"rgba(255,255,255,0.75)", borderRadius:7, padding:"5px 11px", fontSize:11, fontWeight:600, cursor:"pointer" }}>{signingOut?"…":"Sign Out"}</button>
            </div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10, padding:"13px 0 0", borderTop:"1px solid rgba(255,255,255,0.12)" }}>
            <button onClick={()=>setWeek(addWeeks(week,-1))} style={{ ...G, color:"rgba(255,255,255,0.75)", borderColor:"rgba(255,255,255,0.25)", padding:"5px 13px", fontSize:12 }}>← Prev</button>
            <div style={{ flex:1, textAlign:"center" }}>
              <div style={{ color:GOLD, fontSize:10, fontWeight:800, letterSpacing:"1.2px", textTransform:"uppercase" }}>{isThisWeek?"This Sunday":"Sunday Service"}</div>
              <div style={{ color:WHITE, fontSize:14, fontWeight:600 }}>{weekLabel(week)}</div>
            </div>
            <button onClick={()=>setWeek(addWeeks(week,1))} style={{ ...G, color:"rgba(255,255,255,0.75)", borderColor:"rgba(255,255,255,0.25)", padding:"5px 13px", fontSize:12 }}>Next →</button>
          </div>
          {allWeeks.length>1&&<div style={{ display:"flex", gap:5, overflowX:"auto", padding:"9px 0 0", scrollbarWidth:"none" }}>{allWeeks.slice(0,10).map(w=><button key={w} onClick={()=>setWeek(w)} style={{ background:w===week?GOLD:"rgba(255,255,255,0.12)", color:WHITE, border:"none", borderRadius:6, padding:"3px 12px", fontSize:11, cursor:"pointer", whiteSpace:"nowrap", fontWeight:w===week?700:400 }}>{weekShort(w)}</button>)}</div>}
          <div style={{ display:"flex", gap:0, marginTop:14, overflowX:"auto" }}>
            {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{ background:tab===t.id?"rgba(255,255,255,0.15)":"transparent", color:tab===t.id?WHITE:"rgba(255,255,255,0.5)", border:"none", borderRadius:"8px 8px 0 0", padding:"9px 14px", fontWeight:tab===t.id?700:500, fontSize:12, cursor:"pointer", borderBottom:tab===t.id?`2.5px solid ${GOLD}`:"2.5px solid transparent", whiteSpace:"nowrap" }}>{t.label}</button>)}
          </div>
        </div>
      </div>

      <div style={{ maxWidth:860, margin:"0 auto", padding:"20px 18px" }}>
        {status==="connecting"&&<div style={{ background:"#FEF9C3", border:"1px solid #FDE047", borderRadius:10, padding:"12px 16px", marginBottom:16, fontSize:13, color:"#854D0E", fontWeight:500 }}>⏳ Connecting to database…</div>}
        {status==="error"&&<div style={{ background:"#FEE2E2", border:"1px solid #FCA5A5", borderRadius:10, padding:"12px 16px", marginBottom:16, fontSize:13, color:"#991B1B", fontWeight:500 }}>⚠️ Cannot connect to Firebase. Check your internet connection.</div>}

        {tab==="calendar"&&<MonthCalendar songs={songs} sched={sched} onSelectWeek={w=>{setWeek(w);setTab("overview");}}/>}
        {tab==="overview"&&<Overview week={week} songs={songs} sched={sched}/>}
        {tab==="songs"&&<>
          <div style={{ display:"flex", gap:9, marginBottom:14, flexWrap:"wrap" }}>
            <input style={{ ...IN, width:"auto", flex:"1 1 150px", maxWidth:250 }} placeholder="Search song or artist…" value={search} onChange={e=>setSearch(e.target.value)}/>
            <select style={{ ...IN, width:"auto" }} value={catFilter} onChange={e=>setCat(e.target.value)}><option value="All">All Categories</option>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select>
            <button style={{ ...B, background:GOLD, color:WHITE, marginLeft:"auto" }} onClick={()=>{setEditing(null);setModal(true);}}>+ Add Song</button>
          </div>
          <div style={{ display:"flex", gap:9, marginBottom:18, flexWrap:"wrap" }}>
            {[{label:"Songs This Week",val:(songs[week]||[]).length},{label:"With YouTube",val:(songs[week]||[]).filter(s=>getYouTubeId(s.youtube)).length},{label:"With Lyrics",val:(songs[week]||[]).filter(s=>s.lyrics).length},{label:"Weeks Logged",val:allWeeks.length}].map(m=><div key={m.label} style={{ background:WHITE, borderRadius:10, border:`1px solid ${BORDER}`, padding:"9px 16px", minWidth:105 }}><div style={{ fontSize:22, fontWeight:800, color:NAVY }}>{m.val}</div><div style={{ fontSize:10, color:MUTED, fontWeight:700, marginTop:1 }}>{m.label}</div></div>)}
          </div>
          {weekSongs.length===0?<div style={{ textAlign:"center", padding:"60px 0", color:MUTED }}><div style={{ fontSize:44, opacity:0.2, marginBottom:12 }}>♪</div><div style={{ fontWeight:700, fontSize:16, marginBottom:5, color:NAVY }}>No songs for this Sunday yet</div><div style={{ fontSize:13, marginBottom:22 }}>Add songs or use ✨ AI Lyrics to generate them.</div><div style={{ display:"flex", gap:10, justifyContent:"center" }}><button style={{ ...B, background:NAVY, color:WHITE }} onClick={()=>{setEditing(null);setModal(true);}}>Add Song</button><button style={{ ...B, background:PURPLE, color:WHITE }} onClick={()=>setTab("ai")}>✨ AI Lyrics</button></div></div>:(
            <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
              {weekSongs.map((song,i)=><SongCard key={song.id} song={song} index={i} onEdit={()=>{setEditing(song);setModal(true);}} onDelete={async()=>{const list=(songs[week]||[]).filter(s=>s.id!==song.id);await saveSongs(week,list);notify("Song removed","info");}}/>)}
            </div>
          )}
        </>}
        {tab==="schedule"&&<TeamSchedule week={week} sched={sched} onSave={saveSched}/>}
        {tab==="ai"&&<AILyricsTab week={week} songs={songs} onAddSong={handleAIAddSong}/>}
      </div>

      {modal&&<SongModal initial={editing} onSave={handleSongSave} onClose={()=>{setModal(false);setEditing(null);}}/>}
      {toast&&<div style={{ position:"fixed", bottom:22, right:22, background:toast.type==="error"?"#C0392B":NAVY, color:WHITE, borderRadius:10, padding:"11px 18px", fontSize:13, fontWeight:700, zIndex:9999, boxShadow:"0 4px 20px rgba(0,0,0,0.2)", maxWidth:300 }}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate/>);
</script>
</body>
</html>
