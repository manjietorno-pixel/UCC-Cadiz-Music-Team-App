// ── Helpers ──────────────────────────────────────────────────────
function getYouTubeId(url) {
  if (!url) return null;
  for (const p of [/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/, /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/]) {
    const m = url.match(p); if (m) return m[1];
  }
  return null;
}
function getSunday(date) {
  const d = new Date(date);
  d.setDate(d.getDate() - d.getDay());
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function addWeeks(dateStr, n) {
  const [y,m,d] = dateStr.split("-").map(Number);
  const date = new Date(y, m-1, d);
  date.setDate(date.getDate() + n * 7);
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
}
function weekLabel(w) {
  const [y,m,d] = w.split("-").map(Number);
  return new Date(y, m-1, d).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
}
function weekShort(w) {
  const [y,m,d] = w.split("-").map(Number);
  return new Date(y, m-1, d).toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function weekKey(w)  { return "w" + w.replace(/-/g,""); }
function keyToDate(k) {
  const s = k.replace(/^w/,"");
  return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
}
function getSundaysInMonth(year, month) {
  const sundays = [], d = new Date(year, month, 1);
  d.setDate(d.getDate() + ((7 - d.getDay()) % 7));
  while (d.getMonth() === month) {
    sundays.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`);
    d.setDate(d.getDate()+7);
  }
  return sundays;
}
function monthLabel(year, month) {
  return new Date(year, month, 1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
}
function YTIcon({size=14}) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{display:"block",flexShrink:0}}><rect x="2" y="5" width="20" height="14" rx="3" fill={RED}/><polygon points="10,8.5 16,12 10,15.5" fill="white"/></svg>;
}

// ── Copy All Songs ───────────────────────────────────────────────
function formatSongsForCopy(songList, weekLabelStr) {
  if (!songList.length) return "";
  const parts = songList.map((song, i) => {
    let block = `${i + 1}. ${song.title || "Untitled"}`;
    if (song.artist) block += ` — ${song.artist}`;
    if (song.key)    block += ` (Key: ${song.key})`;
    block += "\n";
    block += song.lyrics?.trim() ? "\n" + song.lyrics.trim() + "\n" : "\n[No lyrics added yet]\n";
    return block;
  });
  return `Worship Set — ${weekLabelStr}\n${"=".repeat(40)}\n\n` + parts.join("\n" + "-".repeat(40) + "\n\n");
}

function CopyAllSongsButton({ week, songs }) {
  const [copied, setCopied] = useState(false);
  const list = songs[week] || [];

  function handleCopy() {
    const text = formatSongsForCopy(list, weekLabel(week));
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true); setTimeout(()=>setCopied(false), 2500);
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      setCopied(true); setTimeout(()=>setCopied(false), 2500);
    });
  }

  return (
    <button onClick={handleCopy} disabled={list.length===0}
      style={{...B, background:list.length===0?"#A0B0CC":(copied?"#1A7F55":NAVY), color:WHITE,
        fontSize:12, padding:"7px 14px", cursor:list.length===0?"not-allowed":"pointer",
        display:"flex", alignItems:"center", gap:6}}
      title={list.length===0?"No songs added for this Sunday yet":"Copy all songs + lyrics for this Sunday"}>
      {copied ? "✓ Copied!" : "📋 Copy All for Deck"}
    </button>
  );
}

        </div>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${BORDER}`,display:"flex",gap:8,flexShrink:0}}>
          <input style={{...IN,flex:1}} placeholder="Search title or artist…" value={q} onChange={e=>setQ(e.target.value)} autoFocus/>
          <select style={{...IN,width:"auto"}} value={cat} onChange={e=>setCat(e.target.value)}>
            <option value="All">All</option>
            {CATEGORIES.map(c=><option key={c}>{c}</option>)}

                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,fontSize:13,color:NAVY}}>{song.title}</span>
                    <span style={{fontSize:9,background:color+"22",color,borderRadius:4,padding:"1px 7px",fontWeight:700}}>{song.category}</span>

// ── Song Modal ───────────────────────────────────────────────────

  const [form, setForm]           = useState(initial ? {...blank,...initial} : blank);
  const [saving, setSaving]       = useState(false);
  const [showPicker, setShowPicker] = useState(false);
  const [showSugg, setShowSugg]   = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const vid = getYouTubeId(form.youtube);

  const suggestions = useMemo(() => {
    if (!form.title.trim() || initial) return [];
    const q = form.title.toLowerCase();
    return library.filter(s=>s.title.toLowerCase().includes(q)).slice(0,6);
  }, [form.title, library, initial]);

  function pickFromLibrary(song) { setForm({...blank,...song,id:undefined}); setShowPicker(false); setShowSugg(false); }

  async function submit() {
    if (!form.title.trim()) return;
    setSaving(true);
    await onSave({...form, id:initial?.id||Date.now().toString(), title:form.title.trim()});
    setSaving(false);
  }

  return (
    <>
    {showPicker && <LibraryPicker library={library} onPick={pickFromLibrary} onClose={()=>setShowPicker(false)}/>}
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(10,20,50,0.6)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>

        <div style={{background:NAVY,borderRadius:"16px 16px 0 0",padding:"17px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:1}}>
          <span style={{color:WHITE,fontSize:16,fontWeight:700}}>{initial?"Edit Song":"Add Song"}</span>

              <button onClick={()=>setShowPicker(true)} style={{...G,color:GOLD,borderColor:GOLD,fontSize:11,padding:"4px 11px",background:"rgba(255,255,255,0.1)"}}>
                📚 Browse Library
              </button>
            )}
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)",border:"none",color:WHITE,borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          </div>
        </div>
        <div style={{padding:22,display:"flex",flexDirection:"column",gap:13}}>
          {/* Title with live suggestions */}
          <div style={{position:"relative"}}>
            <label style={LB}>Song Title *</label>

                {suggestions.map(s=>(

                    style={{padding:"9px 12px",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:8,borderBottom:`1px solid ${BORDER}`}}
                    onMouseEnter={e=>e.currentTarget.style.background=LIGHT}

// ── Monthly Calendar Tab ─────────────────────────────────────────
function MonthCalendar({songs, sched, onSelectWeek}) {
  const today = new Date();
  const [calYear,  setCalYear]  = useState(today.getFullYear());
  const [calMonth, setCalMonth] = useState(today.getMonth());

  function shiftMonth(n) {
    let m = calMonth + n, y = calYear;
    if (m > 11) { m = 0; y++; } if (m < 0) { m = 11; y--; }
    setCalMonth(m); setCalYear(y);
  }

  const sundays  = getSundaysInMonth(calYear, calMonth);
  const todayStr = getSunday(today);

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
        <button onClick={()=>shiftMonth(-1)} style={{...G,padding:"6px 14px"}}>← Prev</button>
        <div style={{flex:1,textAlign:"center",fontWeight:800,fontSize:16,color:NAVY}}>{monthLabel(calYear,calMonth)}</div>
        <button onClick={()=>shiftMonth(1)}  style={{...G,padding:"6px 14px"}}>Next →</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {sundays.map(w => {
          const team     = sched[w]||{}, songList = songs[w]||[];
          const filled   = ROLES.filter(r=>team[r.key]?.trim());
          const isToday  = w===todayStr;
          return (
            <div key={w} onClick={()=>onSelectWeek(w)}
              style={{background:WHITE,borderRadius:14,border:`2px solid ${isToday?GOLD:BORDER}`,overflow:"hidden",cursor:"pointer",boxShadow:isToday?"0 2px 12px rgba(201,168,76,0.2)":"none"}}>
              <div style={{background:isToday?`linear-gradient(90deg,${NAVY},#2a4f8f)`:LIGHT,padding:"10px 15px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontSize:10,fontWeight:800,color:isToday?GOLD:MUTED,textTransform:"uppercase",letterSpacing:"1px"}}>{isToday?"This Sunday":"Sunday"}</div>
                  <div style={{fontSize:15,fontWeight:800,color:isToday?WHITE:NAVY}}>{weekLabel(w)}</div>
                </div>
                <div style={{display:"flex",gap:7,alignItems:"center"}}>
                  {songList.length>0 && <span style={{fontSize:11,background:isToday?"rgba(255,255,255,0.15)":"#E8F4FD",color:isToday?WHITE:"#2563EB",borderRadius:6,padding:"2px 9px",fontWeight:700}}>🎵 {songList.length} song{songList.length!==1?"s":""}</span>}
                  <span style={{fontSize:12,color:isToday?"rgba(255,255,255,0.6)":MUTED}}>→</span>
                </div>
              </div>
              <div style={{padding:"10px 14px"}}>
                {filled.length===0 ? (
                  <div style={{fontSize:12,color:MUTED,fontStyle:"italic"}}>No team assigned yet</div>
                ) : (
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {filled.map(r=>(
                      <div key={r.key} style={{display:"flex",alignItems:"center",gap:5,background:LIGHT,borderRadius:8,padding:"4px 10px",border:`1px solid ${BORDER}`}}>
                        <span style={{fontSize:13}}>{r.icon}</span>
                        <div>
                          <div style={{fontSize:9,fontWeight:700,color:MUTED,textTransform:"uppercase",letterSpacing:"0.3px"}}>{r.label}</div>
                          <div style={{fontSize:12,fontWeight:700,color:NAVY}}>{team[r.key]}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {songList.length>0 && (
                  <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${BORDER}`,display:"flex",flexWrap:"wrap",gap:5}}>
                    {songList.slice(0,4).map((s,i)=>{
                      const c = CAT_COLORS[s.category]||MUTED;
                      return <span key={s.id} style={{fontSize:11,background:c+"18",color:c,borderRadius:5,padding:"2px 8px",fontWeight:600}}>{i+1}. {s.title}</span>;
                    })}
                    {songList.length>4 && <span style={{fontSize:11,color:MUTED}}>+{songList.length-4} more</span>}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:9}}>
              <div style={{width:34,height:34,borderRadius:8,background:NAVY+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{r.icon}</div>
              <label style={{...LB,margin:0,fontSize:12}}>{r.label}</label>
            </div>
            <input style={{...IN,fontSize:13,background:isAdmin?WHITE:"#F4F6FB",cursor:isAdmin?"text":"default"}}
              value={form[r.key]||""} onChange={e=>isAdmin&&set(r.key,e.target.value)}
              readOnly={!isAdmin} placeholder={isAdmin?"Enter name…":"—"}/>
          </div>
        ))}
      </div>
      {isAdmin ? (
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button style={{...B,background:NAVY,color:WHITE,opacity:saving?0.6:1}} onClick={save} disabled={saving}>{saving?"Saving…":"Save Schedule"}</button>
          {saved && filled.length>0 && <span style={{fontSize:13,color:"#1A7F55",fontWeight:600}}>✓ Saved</span>}
          {!saved && <span style={{fontSize:13,color:GOLD,fontWeight:600}}>● Unsaved changes</span>}
        </div>
      ) : (
        <div style={{padding:"12px 16px",background:LIGHT,border:`1px solid ${BORDER}`,borderRadius:10,fontSize:13,color:MUTED,textAlign:"center"}}>
          👀 Viewing as guest — log in as admin to edit the team schedule.
        </div>
      )}
      {filled.length===0 && (
        <div style={{textAlign:"center",padding:"50px 0",color:MUTED}}>
          <div style={{fontSize:40,opacity:0.2,marginBottom:10}}>👥</div>
          <div style={{fontWeight:700,fontSize:15,color:NAVY,marginBottom:4}}>No team assigned yet</div>
          <div style={{fontSize:13}}>{isAdmin?"Fill in the names above and tap Save Schedule.":"Check back later — no team assigned yet."}</div>
        </div>
      )}
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────
function App() {
  const [songs,    setSongs]   = useState({});
  const [sched,    setSched]   = useState({});
  const [library,  setLibrary] = useState([]);
  const [week,     setWeek]    = useState(getSunday(new Date()));
  const [tab,      setTab]     = useState("calendar");
  const [modal,    setModal]   = useState(false);
  const [editing,  setEditing] = useState(null);
  const [search,   setSearch]  = useState("");
  const [catFilter,setCat]     = useState("All");
  const [toast,    setToast]   = useState(null);
  const [status,   setStatus]  = useState("connecting");
  const [access,   setAccess]  = useState(ACCESS.VIEWER);   // everyone starts as viewer
  const [showLogin, setShowLogin] = useState(false);

  const isAdmin = access === ACCESS.ADMIN;
  const notify = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),3500); };

  useEffect(()=>{
    if (!db) { setStatus("error"); return; }
    const songsRef = db.ref(`${DB_ROOT}/songs`);
    const schedRef = db.ref(`${DB_ROOT}/schedule`);
    const libRef   = db.ref(`${DB_ROOT}/library`);

    songsRef.on("value", snap=>{
      const val = snap.val()||{}, out = {};
      Object.keys(val).forEach(k=>{ out[keyToDate(k)] = Object.values(val[k]||{}); });
      setSongs(out); setStatus("online");
    }, ()=>setStatus("error"));

    schedRef.on("value", snap=>{
      const val = snap.val()||{}, out = {};
      Object.keys(val).forEach(k=>{ out[keyToDate(k)] = val[k]; });
      setSched(out);
    });

    libRef.on("value", snap=>{
      const val = snap.val()||{};
      setLibrary(Object.values(val));
    });

    return ()=>{ songsRef.off(); schedRef.off(); libRef.off(); };
  },[]);

  async function saveToLibrary(song) {
    if (!db || !isAdmin) return;
    await db.ref(`${DB_ROOT}/library/${song.id}`).set(song);
  }
  async function deleteFromLibrary(id) {
    if (!db || !isAdmin) return;
    await db.ref(`${DB_ROOT}/library/${id}`).remove();
    notify("Song deleted from library","info");
  }
  async function saveSongs(w, list) {
    if (!db || !isAdmin) return;
    const obj = {}; list.forEach(s=>{ obj[s.id]=s; });
    await db.ref(`${DB_ROOT}/songs/${weekKey(w)}`).set(list.length?obj:null);
  }
  async function saveSched(w, data) {
    if (!db || !isAdmin) return;
    await db.ref(`${DB_ROOT}/schedule/${weekKey(w)}`).set(data);
    notify("Team schedule saved!");
  }
  async function handleSongSave(song) {
    const list = [...(songs[week]||[])];
    if (editing) {
      const i = list.findIndex(s=>s.id===editing.id);
      if (i>-1) list[i]=song; else list.push(song);
    } else { list.push(song); }
    await saveSongs(week, list);
    await saveToLibrary(song);
    setModal(false); setEditing(null);
    notify(editing?"Song updated!":"Song added! 🎵");
  }

  const thisWeek   = getSunday(new Date());
  const isThisWeek = week === thisWeek;
  const allWeeks   = [...new Set([...Object.keys(songs),...Object.keys(sched)])].sort().reverse();

  const weekSongs = (songs[week]||[]).filter(s=>{
    const q = search.toLowerCase();
    return (!q||s.title.toLowerCase().includes(q)||(s.artist||"").toLowerCase().includes(q))
      && (catFilter==="All"||s.category===catFilter);
  });

  const TABS = [
    {id:"calendar", label:"📅 Monthly View"},
    {id:"overview", label:"📋 Sunday Schedule"},
    {id:"songs",    label:"🎵 Manage Songs"},
    {id:"schedule", label:"👥 Assign Team"},
    {id:"library",  label:"📚 Song Library"},
  ];

  const statusDot  = {online:"#4ADE80",error:"#F87171",connecting:"#FCD34D"}[status];
  const statusText = {online:"Live",error:"Offline",connecting:"Connecting…"}[status];

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:LIGHT,minHeight:"100vh",color:"#1a2744"}}>

      {/* Login modal */}
      {showLogin && (
        <AdminLoginModal
          onSuccess={()=>{ setAccess(ACCESS.ADMIN); setShowLogin(false); notify("Logged in as admin 🔐"); }}
          onClose={()=>setShowLogin(false)}
        />
      )}

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1B3A6B 0%,#2a4f8f 100%)"}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"18px 18px 0"}}>

          <div style={{display:"flex",alignItems:"center",gap:13,marginBottom:14}}>
            <div style={{width:42,height:42,borderRadius:10,background:GOLD,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <svg width="23" height="23" viewBox="0 0 24 24" fill="none">
                <path d="M9 18V5l12-2v13" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <circle cx="6" cy="18" r="3" stroke="white" strokeWidth="2"/>
                <circle cx="18" cy="16" r="3" stroke="white" strokeWidth="2"/>
              </svg>
            </div>
            <div style={{flex:1}}>
              <div style={{color:WHITE,fontSize:18,fontWeight:800,lineHeight:1.2}}>UCC Cadiz Music Team Hub</div>
              <div style={{color:GOLD,fontSize:11,fontWeight:600}}>Universal Church of Christ Incorporated · Cadiz City</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:statusDot}}/>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.6)",fontWeight:500}}>{statusText}</span>
              </div>
              {isAdmin ? (
                <button
                  onClick={()=>{ setAccess(ACCESS.VIEWER); notify("Logged out","info"); }}
                  style={{...G,fontSize:11,padding:"5px 12px",color:"rgba(255,255,255,0.8)",borderColor:"rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.1)"}}>
                  🔓 Admin · Log out
                </button>
              ) : (
                <button
                  onClick={()=>setShowLogin(true)}
                  style={{...G,fontSize:11,padding:"5px 12px",color:"rgba(255,255,255,0.7)",borderColor:"rgba(255,255,255,0.25)",background:"rgba(255,255,255,0.08)"}}>
                  🔐 Admin Login
                </button>
              )}
            </div>
          </div>

          {/* Access badge */}
          <div style={{display:"inline-flex",alignItems:"center",gap:5,background:isAdmin?"rgba(201,168,76,0.2)":"rgba(255,255,255,0.08)",borderRadius:6,padding:"3px 10px",marginBottom:10,border:`1px solid ${isAdmin?"rgba(201,168,76,0.4)":"rgba(255,255,255,0.15)"}`}}>
            <span style={{fontSize:11}}>{isAdmin?"✏️":"👀"}</span>
            <span style={{fontSize:11,color:isAdmin?GOLD:"rgba(255,255,255,0.6)",fontWeight:600}}>{isAdmin?"Admin — full edit access":"View only"}</span>
          </div>

          {/* Week nav */}
          {tab!=="library" && (
            <>
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"13px 0 0",borderTop:"1px solid rgba(255,255,255,0.12)"}}>
                <button onClick={()=>setWeek(addWeeks(week,-1))} style={{...G,color:"rgba(255,255,255,0.75)",borderColor:"rgba(255,255,255,0.25)",padding:"5px 13px",fontSize:12}}>← Prev</button>
                <div style={{flex:1,textAlign:"center"}}>
                  <div style={{color:GOLD,fontSize:10,fontWeight:800,letterSpacing:"1.2px",textTransform:"uppercase"}}>{isThisWeek?"This Sunday":"Sunday Service"}</div>
                  <div style={{color:WHITE,fontSize:14,fontWeight:600}}>{weekLabel(week)}</div>
                </div>
                <button onClick={()=>setWeek(addWeeks(week,1))} style={{...G,color:"rgba(255,255,255,0.75)",borderColor:"rgba(255,255,255,0.25)",padding:"5px 13px",fontSize:12}}>Next →</button>
              </div>
              {allWeeks.length>1 && (
                <div style={{display:"flex",gap:5,overflowX:"auto",padding:"9px 0 0",scrollbarWidth:"none"}}>
                  {allWeeks.slice(0,10).map(w=>(
                    <button key={w} onClick={()=>setWeek(w)}
                      style={{background:w===week?GOLD:"rgba(255,255,255,0.12)",color:WHITE,border:"none",borderRadius:6,padding:"3px 12px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap",fontWeight:w===week?700:400}}>
                      {weekShort(w)}
                    </button>
                  ))}
                </div>
              )}
            </>
          )}

          {/* Tabs */}
          <div style={{display:"flex",gap:0,marginTop:14,overflowX:"auto",scrollbarWidth:"none"}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                background:tab===t.id?"rgba(255,255,255,0.15)":"transparent",
                color:tab===t.id?WHITE:"rgba(255,255,255,0.5)",
                border:"none",borderRadius:"8px 8px 0 0",
                padding:"9px 14px",fontWeight:tab===t.id?700:500,
                fontSize:12,cursor:"pointer",whiteSpace:"nowrap",
                borderBottom:tab===t.id?`2.5px solid ${GOLD}`:"2.5px solid transparent",
              }}>{t.label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Body */}
      <div style={{maxWidth:900,margin:"0 auto",padding:"20px 18px"}}>
        {status==="connecting" && <div style={{background:"#FEF9C3",border:"1px solid #FDE047",borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:13,color:"#854D0E",fontWeight:500}}>⏳ Connecting to database…</div>}
        {status==="error"      && <div style={{background:"#FEE2E2",border:"1px solid #FCA5A5",borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:13,color:"#991B1B",fontWeight:500}}>⚠️ Cannot connect to Firebase. Check your internet connection.</div>}

        {tab==="calendar" && <MonthCalendar songs={songs} sched={sched} onSelectWeek={w=>{setWeek(w);setTab("overview");}}/>}
        {tab==="overview" && <Overview week={week} songs={songs} sched={sched}/>}

        {tab==="songs" && <>
          <div style={{display:"flex",gap:9,marginBottom:14,flexWrap:"wrap"}}>
            <input style={{...IN,width:"auto",flex:"1 1 150px",maxWidth:250}} placeholder="Search song or artist…" value={search} onChange={e=>setSearch(e.target.value)}/>
            <select style={{...IN,width:"auto"}} value={catFilter} onChange={e=>setCat(e.target.value)}>
              <option value="All">All Categories</option>
              {CATEGORIES.map(c=><option key={c}>{c}</option>)}
            </select>
            {isAdmin && <button style={{...B,background:GOLD,color:WHITE,marginLeft:"auto"}} onClick={()=>{setEditing(null);setModal(true);}}>+ Add Song</button>}
          </div>
          <div style={{display:"flex",gap:9,marginBottom:18,flexWrap:"wrap"}}>
            {[
              {label:"Songs This Week", val:(songs[week]||[]).length},
              {label:"With YouTube",    val:(songs[week]||[]).filter(s=>getYouTubeId(s.youtube)).length},
              {label:"In Library",      val:library.length},
            ].map(m=>(
              <div key={m.label} style={{background:WHITE,borderRadius:10,border:`1px solid ${BORDER}`,padding:"9px 16px",minWidth:105}}>
                <div style={{fontSize:22,fontWeight:800,color:NAVY}}>{m.val}</div>
                <div style={{fontSize:10,color:MUTED,fontWeight:700,marginTop:1}}>{m.label}</div>
              </div>
            ))}
          </div>
          {weekSongs.length===0 ? (
            <div style={{textAlign:"center",padding:"60px 0",color:MUTED}}>
              <div style={{fontSize:44,opacity:0.2,marginBottom:12}}>♪</div>
              <div style={{fontWeight:700,fontSize:16,marginBottom:5,color:NAVY}}>No songs for this Sunday yet</div>
              <div style={{fontSize:13,marginBottom:22}}>{isAdmin?"Add songs from the library or create new ones.":"No songs added yet — check back later."}</div>
              {isAdmin && <button style={{...B,background:NAVY,color:WHITE}} onClick={()=>{setEditing(null);setModal(true);}}>Add First Song</button>}
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {weekSongs.map((song,i)=>(
                <SongCard key={song.id} song={song} index={i} isAdmin={isAdmin}
                  inLibrary={library.some(l=>l.id===song.id)}
                  onSaveToLibrary={async s=>{ await saveToLibrary(s); notify("Saved to library! 📚"); }}
                  onEdit={()=>{ setEditing(song); setModal(true); }}
                  onDelete={async()=>{ const list=(songs[week]||[]).filter(s=>s.id!==song.id); await saveSongs(week,list); notify("Removed from this Sunday","info"); }}/>
              ))}
            </div>
          )}
        </>}

        {tab==="schedule" && <TeamSchedule week={week} sched={sched} isAdmin={isAdmin} onSave={saveSched}/>}

        {tab==="library" && (
          <LibraryTab library={library} isAdmin={isAdmin}
            onSaveToLibrary={async song=>{ await saveToLibrary(song); notify("Saved to library! 📚"); }}
            onDeleteFromLibrary={deleteFromLibrary}/>
        )}
      </div>

      {isAdmin && modal && (
        <SongModal
          initial={editing}
          library={library}
          onSave={handleSongSave}
          onClose={()=>{setModal(false);setEditing(null);}}/>
      )}

      {toast && (
        <div style={{position:"fixed",bottom:22,right:22,background:toast.type==="error"?"#C0392B":NAVY,color:WHITE,borderRadius:10,padding:"11px 18px",fontSize:13,fontWeight:700,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,0.2)",maxWidth:300}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
